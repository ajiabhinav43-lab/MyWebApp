{% extends 'base.html' %}
{% block content %}
<h2>Users</h2>

<ul>
{% for user in users %}
  <li>
    {{ user.username }} ({{ user.role }})
    <form method="POST" action="/admin/users/{{ user.id }}/toggle-role">
      <button type="submit">Toggle Role</button>
    </form>
  </li>
{% endfor %}
</ul>

{% endblock %}
