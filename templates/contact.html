{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <h2>Contact Hospital</h2>
            <p><strong>Address:</strong> Care Your Health Hospital, Kochi, Kerala</p>
            <p><strong>Emergency:</strong> +91 98765 43210</p>
            <p><strong>Email:</strong> support@careyourhealth.com</p>
            <p><strong>Working Hours:</strong> 24/7 Emergency | OP 9 AM - 6 PM</p>
        </div>

        <div class="col-md-6">
            <div class="form-card">
                <form method="POST">
                    <input class="form-control mb-3" name="name" placeholder="Your Name" required>
                    <input class="form-control mb-3" name="email" placeholder="Email" required>
                    <input class="form-control mb-3" name="phone" placeholder="Phone" required>
                    <textarea class="form-control mb-3" name="message" placeholder="Message" required></textarea>
                    <button class="btn btn-success w-100">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
